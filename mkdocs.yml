site_name: 我的文档
site_description: Linux / Python / 项目文档
site_author: Your Name

# 网站地址（可选）
site_url: https://example.com

# 文档目录
docs_dir: docs

# 构建输出目录
site_dir: site

theme:
  name: material
  language: zh

  # logo
  # logo: assets/logo.png

  features:
    - navigation.tabs        # 顶部导航
    - navigation.sections    # 分组导航
    - navigation.expand      # 默认展开目录
    - navigation.top         # 返回顶部
    - search.highlight       # 搜索高亮
    - search.share

  palette:
    # 日间/夜间模式
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-sunny
        name: 浅色模式

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-night
        name: 深色模式

# Markdown扩展
markdown_extensions:
  - toc:
      permalink: true

  - admonition

  - pymdownx.highlight
  - pymdownx.superfences

  - pymdownx.tabbed

  - pymdownx.details

# 插件
plugins:
  - search

# 导航目录
nav:
  - 首页: index.md

  - Java:
      - java基础: java/java_base.md
      - 数据结构与算法: java/data_structure_algorithm.md
      - JVM: java/jvm.md


  - Linux:
      - 部署vp: linux/vp_build.md
      - vp1-首选: linux/vp1_v2rayA.md
      - vp2: linux/vp2_clash.md
      - ed25519|git_config: linux/ed25519.md
      - ssh_key: linux/ssh_key.md
      - linux防暴破解: linux/fail2ban.md
      - 内网穿透: linux/内网穿透.md
      - TG 代理: linux/TG代理.md
      - 虚拟内存: linux/linux虚拟内存.md
      - 文件互传: linux/文件互传.md

  - Python:
      - Conda环境: python/conda.md
      - MkDocs安装: python/mkdocs.md


  - DOCKER:
      - 暗转: docker/docker安装.md
      - nginx: docker/nginx.md
      - 常用软件: docker/docker-部署镜像.md

  - 项目:
      - 项目说明: project/about.md
      - AI面试问答提示词: project/ai_interview_prompt.md
      - cloudflare临时邮箱: project/cloudflare-temp-email-2026.md

