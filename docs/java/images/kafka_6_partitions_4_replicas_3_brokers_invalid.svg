<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="760" viewBox="0 0 1080 760" role="img" aria-labelledby="title desc">
  <title id="title">Kafka 6 分区 4 副本 3 Broker 无法正常分布示意图</title>
  <desc id="desc">Topic A 有 6 个分区，副本因子为 4，但只有 3 个 Broker。因为同一个分区的多个副本不能放在同一个 Broker 上，所以第 4 个副本无法放置。</desc>
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .page { fill: #f8fafc; }
      .title { fill: #0f172a; font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 22px; font-weight: 700; }
      .subtitle { fill: #475569; font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 14px; }
      .broker { fill: #ffffff; stroke: #64748b; stroke-width: 2; filter: url(#shadow); }
      .broker-title { fill: #0f172a; font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 18px; font-weight: 700; }
      .broker-sub { fill: #64748b; font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 13px; }
      .leader { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
      .follower { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
      .missing { fill: #fee2e2; stroke: #dc2626; stroke-width: 2; stroke-dasharray: 7 5; }
      .part-title { fill: #111827; font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 15px; font-weight: 700; }
      .part-role { fill: #334155; font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 13px; }
      .missing-text { fill: #991b1b; font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 13px; font-weight: 700; }
      .note { fill: #1e293b; font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 14px; }
      .warn { fill: #991b1b; font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 15px; font-weight: 700; }
      .tiny { fill: #64748b; font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 12px; }
      .summary { fill: #fff7ed; stroke: #f97316; stroke-width: 1.8; }
      .legend-box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="1080" height="760"/>

  <text class="title" x="540" y="40" text-anchor="middle">Topic A：6 个分区 × 4 个副本，只有 3 个 Broker</text>
  <text class="subtitle" x="540" y="66" text-anchor="middle">结论：正常 Kafka 集群中无法创建，因为 replication.factor 不能大于可用 Broker 数</text>

  <rect class="summary" x="110" y="90" width="860" height="78" rx="8"/>
  <text class="note" x="540" y="119" text-anchor="middle">需要的副本总数：6 × 4 = 24</text>
  <text class="note" x="540" y="143" text-anchor="middle">3 个 Broker 最多只能给每个分区放 3 份不同 Broker 副本：6 × 3 = 18</text>
  <text class="warn" x="540" y="163" text-anchor="middle">还缺 6 份第 4 副本，Kafka 不会把同一分区的两个副本放在同一个 Broker 上</text>

  <rect class="broker" x="45" y="205" width="300" height="385" rx="10"/>
  <text class="broker-title" x="195" y="240" text-anchor="middle">Broker 1</text>
  <text class="broker-sub" x="195" y="264" text-anchor="middle">最多保存每个分区 1 份副本</text>

  <rect class="leader" x="80" y="290" width="105" height="58" rx="7"/>
  <text class="part-title" x="132.5" y="313" text-anchor="middle">P0</text>
  <text class="part-role" x="132.5" y="334" text-anchor="middle">Leader</text>
  <rect class="leader" x="205" y="290" width="105" height="58" rx="7"/>
  <text class="part-title" x="257.5" y="313" text-anchor="middle">P3</text>
  <text class="part-role" x="257.5" y="334" text-anchor="middle">Leader</text>

  <rect class="follower" x="80" y="365" width="105" height="58" rx="7"/>
  <text class="part-title" x="132.5" y="388" text-anchor="middle">P1</text>
  <text class="part-role" x="132.5" y="409" text-anchor="middle">Follower</text>
  <rect class="follower" x="205" y="365" width="105" height="58" rx="7"/>
  <text class="part-title" x="257.5" y="388" text-anchor="middle">P2</text>
  <text class="part-role" x="257.5" y="409" text-anchor="middle">Follower</text>

  <rect class="follower" x="80" y="440" width="105" height="58" rx="7"/>
  <text class="part-title" x="132.5" y="463" text-anchor="middle">P4</text>
  <text class="part-role" x="132.5" y="484" text-anchor="middle">Follower</text>
  <rect class="follower" x="205" y="440" width="105" height="58" rx="7"/>
  <text class="part-title" x="257.5" y="463" text-anchor="middle">P5</text>
  <text class="part-role" x="257.5" y="484" text-anchor="middle">Follower</text>

  <text class="tiny" x="195" y="540" text-anchor="middle">已放 6 份副本</text>

  <rect class="broker" x="390" y="205" width="300" height="385" rx="10"/>
  <text class="broker-title" x="540" y="240" text-anchor="middle">Broker 2</text>
  <text class="broker-sub" x="540" y="264" text-anchor="middle">最多保存每个分区 1 份副本</text>

  <rect class="leader" x="425" y="290" width="105" height="58" rx="7"/>
  <text class="part-title" x="477.5" y="313" text-anchor="middle">P1</text>
  <text class="part-role" x="477.5" y="334" text-anchor="middle">Leader</text>
  <rect class="leader" x="550" y="290" width="105" height="58" rx="7"/>
  <text class="part-title" x="602.5" y="313" text-anchor="middle">P4</text>
  <text class="part-role" x="602.5" y="334" text-anchor="middle">Leader</text>

  <rect class="follower" x="425" y="365" width="105" height="58" rx="7"/>
  <text class="part-title" x="477.5" y="388" text-anchor="middle">P0</text>
  <text class="part-role" x="477.5" y="409" text-anchor="middle">Follower</text>
  <rect class="follower" x="550" y="365" width="105" height="58" rx="7"/>
  <text class="part-title" x="602.5" y="388" text-anchor="middle">P2</text>
  <text class="part-role" x="602.5" y="409" text-anchor="middle">Follower</text>

  <rect class="follower" x="425" y="440" width="105" height="58" rx="7"/>
  <text class="part-title" x="477.5" y="463" text-anchor="middle">P3</text>
  <text class="part-role" x="477.5" y="484" text-anchor="middle">Follower</text>
  <rect class="follower" x="550" y="440" width="105" height="58" rx="7"/>
  <text class="part-title" x="602.5" y="463" text-anchor="middle">P5</text>
  <text class="part-role" x="602.5" y="484" text-anchor="middle">Follower</text>

  <text class="tiny" x="540" y="540" text-anchor="middle">已放 6 份副本</text>

  <rect class="broker" x="735" y="205" width="300" height="385" rx="10"/>
  <text class="broker-title" x="885" y="240" text-anchor="middle">Broker 3</text>
  <text class="broker-sub" x="885" y="264" text-anchor="middle">最多保存每个分区 1 份副本</text>

  <rect class="leader" x="770" y="290" width="105" height="58" rx="7"/>
  <text class="part-title" x="822.5" y="313" text-anchor="middle">P2</text>
  <text class="part-role" x="822.5" y="334" text-anchor="middle">Leader</text>
  <rect class="leader" x="895" y="290" width="105" height="58" rx="7"/>
  <text class="part-title" x="947.5" y="313" text-anchor="middle">P5</text>
  <text class="part-role" x="947.5" y="334" text-anchor="middle">Leader</text>

  <rect class="follower" x="770" y="365" width="105" height="58" rx="7"/>
  <text class="part-title" x="822.5" y="388" text-anchor="middle">P0</text>
  <text class="part-role" x="822.5" y="409" text-anchor="middle">Follower</text>
  <rect class="follower" x="895" y="365" width="105" height="58" rx="7"/>
  <text class="part-title" x="947.5" y="388" text-anchor="middle">P1</text>
  <text class="part-role" x="947.5" y="409" text-anchor="middle">Follower</text>

  <rect class="follower" x="770" y="440" width="105" height="58" rx="7"/>
  <text class="part-title" x="822.5" y="463" text-anchor="middle">P3</text>
  <text class="part-role" x="822.5" y="484" text-anchor="middle">Follower</text>
  <rect class="follower" x="895" y="440" width="105" height="58" rx="7"/>
  <text class="part-title" x="947.5" y="463" text-anchor="middle">P4</text>
  <text class="part-role" x="947.5" y="484" text-anchor="middle">Follower</text>

  <text class="tiny" x="885" y="540" text-anchor="middle">已放 6 份副本</text>

  <rect class="missing" x="170" y="622" width="740" height="54" rx="8"/>
  <text class="missing-text" x="540" y="645" text-anchor="middle">缺失的第 4 副本：P0、P1、P2、P3、P4、P5 各还需要 1 份</text>
  <text class="missing-text" x="540" y="665" text-anchor="middle">但只有 3 个 Broker，无法再找第 4 台不同 Broker 存放，所以 Topic 创建会失败</text>

  <rect class="legend-box" x="235" y="700" width="610" height="38" rx="8"/>
  <rect class="leader" x="260" y="711" width="22" height="14" rx="3"/>
  <text class="tiny" x="292" y="723">Leader</text>
  <rect class="follower" x="360" y="711" width="22" height="14" rx="3"/>
  <text class="tiny" x="392" y="723">Follower</text>
  <rect class="missing" x="475" y="711" width="22" height="14" rx="3"/>
  <text class="tiny" x="507" y="723">无法放置的第 4 副本</text>
</svg>
