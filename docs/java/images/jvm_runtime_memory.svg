<svg xmlns="http://www.w3.org/2000/svg" width="980" height="560" viewBox="0 0 980 560" role="img" aria-labelledby="title desc">
  <title id="title">JVM 运行时内存区域</title>
  <desc id="desc">JVM 运行时内存分为线程私有区域和线程共享区域。线程私有包括程序计数器、Java 虚拟机栈、本地方法栈；线程共享包括堆和方法区。</desc>
  <defs>
    <style>
      .title { font: 700 30px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #172033; }
      .subtitle { font: 16px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #5a667a; }
      .group-title { font: 700 22px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #172033; }
      .label { font: 700 20px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #172033; }
      .note { font: 15px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #5a667a; }
      .small { font: 14px "Microsoft YaHei", "Noto Sans CJK SC", sans-serif; fill: #667085; }
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1f2937" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="980" height="560" rx="18" fill="#f7f8fb"/>
  <text x="490" y="52" text-anchor="middle" class="title">JVM 运行时内存区域</text>
  <text x="490" y="82" text-anchor="middle" class="subtitle">按线程归属分为：线程私有区域 + 线程共享区域</text>

  <rect x="55" y="120" width="410" height="360" rx="18" fill="#eef6ff" stroke="#7cb7ef" stroke-width="2" filter="url(#shadow)"/>
  <text x="260" y="158" text-anchor="middle" class="group-title">线程私有</text>
  <text x="260" y="184" text-anchor="middle" class="small">每个线程各自拥有一份</text>

  <rect x="95" y="220" width="330" height="62" rx="12" fill="#ffffff" stroke="#9ac7f2"/>
  <text x="260" y="258" text-anchor="middle" class="label">程序计数器</text>
  <text x="260" y="278" text-anchor="middle" class="note">记录当前线程执行位置</text>

  <rect x="95" y="305" width="330" height="62" rx="12" fill="#ffffff" stroke="#9ac7f2"/>
  <text x="260" y="343" text-anchor="middle" class="label">Java 虚拟机栈</text>
  <text x="260" y="363" text-anchor="middle" class="note">方法调用、局部变量、操作数栈</text>

  <rect x="95" y="390" width="330" height="62" rx="12" fill="#ffffff" stroke="#9ac7f2"/>
  <text x="260" y="428" text-anchor="middle" class="label">本地方法栈</text>
  <text x="260" y="448" text-anchor="middle" class="note">Native 方法调用</text>

  <rect x="515" y="120" width="410" height="360" rx="18" fill="#fff4e8" stroke="#f2b46d" stroke-width="2" filter="url(#shadow)"/>
  <text x="720" y="158" text-anchor="middle" class="group-title">线程共享</text>
  <text x="720" y="184" text-anchor="middle" class="small">所有线程共同访问</text>

  <rect x="555" y="235" width="330" height="78" rx="12" fill="#ffffff" stroke="#f1bf82"/>
  <text x="720" y="272" text-anchor="middle" class="label">堆</text>
  <text x="720" y="294" text-anchor="middle" class="note">对象实例，GC 管理重点</text>

  <rect x="555" y="350" width="330" height="78" rx="12" fill="#ffffff" stroke="#f1bf82"/>
  <text x="720" y="387" text-anchor="middle" class="label">方法区</text>
  <text x="720" y="409" text-anchor="middle" class="note">类元信息、常量、静态变量</text>

  <path d="M465 300 L515 300" stroke="#8b95a7" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="490" y="286" text-anchor="middle" class="small">JVM Runtime Data Area</text>

  <text x="490" y="520" text-anchor="middle" class="subtitle">记忆：栈和计数器跟线程走；堆和方法区大家共享。</text>
</svg>
