  <rect class="follower" x="618" y="590" width="64" height="34" rx="5"/>
  <text class="part" x="650" y="611" text-anchor="middle">B-P8</text>

  <rect class="broker" x="795" y="195" width="350" height="500" rx="10"/>
  <text class="broker-title" x="970" y="230" text-anchor="middle">Broker 3</text>
  <text class="broker-sub" x="970" y="252" text-anchor="middle">约 15 个副本：5 Leader + 10 Follower</text>

  <rect class="section-a" x="820" y="275" width="300" height="145" rx="8"/>
  <text class="section-title" x="970" y="300" text-anchor="middle">Topic A 副本：6 个</text>
  <rect class="leader" x="838" y="318" width="84" height="38" rx="5"/>
  <text class="part" x="880" y="333" text-anchor="middle">A-P2</text>
  <text class="role" x="880" y="349" text-anchor="middle">Leader</text>
  <rect class="leader" x="938" y="318" width="84" height="38" rx="5"/>
