  <rect class="legend" x="270" y="730" width="640" height="50" rx="8"/>
  <rect class="leader" x="300" y="746" width="24" height="16" rx="3"/>
  <text class="tiny" x="335" y="758">Leader 副本</text>
  <rect class="follower" x="455" y="746" width="24" height="16" rx="3"/>
  <text class="tiny" x="490" y="758">Follower 副本</text>
  <text class="tiny" x="655" y="758">每个 Broker 上同时保存多个 Topic 的分区副本</text>
</svg>
