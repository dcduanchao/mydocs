  <text class="role" x="690" y="349" text-anchor="middle">F</text>
  <rect class="follower" x="458" y="370" width="64" height="34" rx="5"/>
  <text class="part" x="490" y="391" text-anchor="middle">A-P2</text>
  <rect class="follower" x="538" y="370" width="64" height="34" rx="5"/>
  <text class="part" x="570" y="391" text-anchor="middle">A-P3</text>
  <rect class="follower" x="618" y="370" width="64" height="34" rx="5"/>
  <text class="part" x="650" y="391" text-anchor="middle">A-P5</text>

  <rect class="section-b" x="440" y="440" width="300" height="220" rx="8"/>
  <text class="section-title" x="590" y="465" text-anchor="middle">Topic B 副本：9 个</text>
  <rect class="leader" x="458" y="485" width="84" height="38" rx="5"/>
  <text class="part" x="500" y="500" text-anchor="middle">B-P1</text>
  <text class="role" x="500" y="516" text-anchor="middle">Leader</text>
  <rect class="leader" x="558" y="485" width="84" height="38" rx="5"/>
  <text class="part" x="600" y="500" text-anchor="middle">B-P4</text>
