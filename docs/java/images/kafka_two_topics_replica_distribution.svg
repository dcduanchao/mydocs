  <rect class="broker" x="415" y="195" width="350" height="500" rx="10"/>
  <text class="broker-title" x="590" y="230" text-anchor="middle">Broker 2</text>
  <text class="broker-sub" x="590" y="252" text-anchor="middle">约 15 个副本：5 Leader + 10 Follower</text>

  <rect class="section-a" x="440" y="275" width="300" height="145" rx="8"/>
