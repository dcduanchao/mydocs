  <rect class="section-b" x="820" y="440" width="300" height="220" rx="8"/>
  <text class="section-title" x="970" y="465" text-anchor="middle">Topic B 副本：9 个</text>
  <rect class="leader" x="838" y="485" width="84" height="38" rx="5"/>
  <text class="part" x="880" y="500" text-anchor="middle">B-P2</text>
  <text class="role" x="880" y="516" text-anchor="middle">Leader</text>
