<svg xmlns="http://www.w3.org/2000/svg" width="960" height="720" viewBox="0 0 960 720" role="img" aria-labelledby="title desc">
  <title id="title">Kafka 消息流转结构图</title>
  <desc id="desc">Producer 发送消息到 Kafka Cluster，Broker 保存 Topic 分区副本，Consumer 和 Consumer Group 拉取消息。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#16a34a"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <style>
      .page { fill: #f8fafc; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; filter: url(#shadow); }
      .cluster { fill: #eef6ff; stroke: #2563eb; stroke-width: 2.5; }
      .broker { fill: #ffffff; stroke: #64748b; stroke-width: 2; }
      .partition-leader { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; }
      .partition-follower { fill: #fef3c7; stroke: #d97706; stroke-width: 2; }
      .consumer { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; }
      .title { fill: #0f172a; font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 20px; font-weight: 700; }
      .label { fill: #1e293b; font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 15px; font-weight: 600; }
      .small { fill: #475569; font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 13px; }
      .tiny { fill: #64748b; font-family: Arial, "Microsoft YaHei", sans-serif; font-size: 12px; }
      .arrow { fill: none; stroke: #2563eb; stroke-width: 2.5; marker-end: url(#arrow); }
      .replica-arrow { fill: none; stroke: #16a34a; stroke-width: 2; stroke-dasharray: 7 5; marker-end: url(#arrow-green); }
    </style>
  </defs>

  <rect class="page" x="0" y="0" width="960" height="720"/>

  <text class="title" x="480" y="40" text-anchor="middle">Kafka 消息流转与集群结构</text>

  <rect class="card" x="390" y="70" width="180" height="72" rx="8"/>
  <text class="label" x="480" y="101" text-anchor="middle">Producer</text>
  <text class="small" x="480" y="123" text-anchor="middle">生产者应用</text>

  <path class="arrow" d="M 480 145 L 480 188"/>
  <text class="small" x="496" y="170">发送消息 Send</text>

  <rect class="cluster" x="120" y="190" width="720" height="350" rx="10"/>
  <text class="label" x="480" y="222" text-anchor="middle">Kafka Cluster</text>
  <text class="small" x="480" y="244" text-anchor="middle">Topic A 按 Partition 分布在多个 Broker 上</text>

  <rect class="broker" x="150" y="270" width="200" height="220" rx="8"/>
  <text class="label" x="250" y="300" text-anchor="middle">Broker 1</text>
  <text class="small" x="250" y="323" text-anchor="middle">Topic A</text>
  <rect class="partition-leader" x="175" y="342" width="150" height="58" rx="6"/>
  <text class="label" x="250" y="365" text-anchor="middle">Partition 0</text>
  <text class="small" x="250" y="386" text-anchor="middle">Leader</text>
  <rect class="partition-follower" x="175" y="415" width="150" height="58" rx="6"/>
  <text class="label" x="250" y="438" text-anchor="middle">Partition 1</text>
  <text class="small" x="250" y="459" text-anchor="middle">Follower</text>

  <rect class="broker" x="380" y="270" width="200" height="220" rx="8"/>
  <text class="label" x="480" y="300" text-anchor="middle">Broker 2</text>
  <text class="small" x="480" y="323" text-anchor="middle">Topic A</text>
  <rect class="partition-follower" x="405" y="360" width="150" height="58" rx="6"/>
  <text class="label" x="480" y="383" text-anchor="middle">Partition 0</text>
  <text class="small" x="480" y="404" text-anchor="middle">Follower</text>
  <rect class="partition-follower" x="405" y="415" width="150" height="58" rx="6"/>
  <text class="label" x="480" y="438" text-anchor="middle">Partition 1</text>
  <text class="small" x="480" y="459" text-anchor="middle">Follower</text>

  <rect class="broker" x="610" y="270" width="200" height="220" rx="8"/>
  <text class="label" x="710" y="300" text-anchor="middle">Broker 3</text>
  <text class="small" x="710" y="323" text-anchor="middle">Topic A</text>
  <rect class="partition-leader" x="635" y="342" width="150" height="58" rx="6"/>
  <text class="label" x="710" y="365" text-anchor="middle">Partition 1</text>
  <text class="small" x="710" y="386" text-anchor="middle">Leader</text>
  <rect class="partition-follower" x="635" y="415" width="150" height="58" rx="6"/>
  <text class="label" x="710" y="438" text-anchor="middle">Partition 0</text>
  <text class="small" x="710" y="459" text-anchor="middle">Follower</text>

  <path class="replica-arrow" d="M 328 371 C 358 360, 374 363, 405 378"/>
  <path class="replica-arrow" d="M 328 388 C 440 510, 586 505, 635 452"/>
  <path class="replica-arrow" d="M 635 371 C 600 350, 578 375, 555 444"/>
  <path class="replica-arrow" d="M 635 389 C 550 520, 310 510, 325 452"/>
  <text class="tiny" x="480" y="518" text-anchor="middle">Follower 从 Leader 复制数据，Leader 对外处理读写</text>

  <path class="arrow" d="M 480 540 L 480 585"/>
  <text class="small" x="496" y="567">拉取消息 Poll</text>

  <rect class="consumer" x="370" y="590" width="220" height="76" rx="8"/>
  <text class="label" x="480" y="623" text-anchor="middle">Consumer</text>
  <text class="small" x="480" y="645" text-anchor="middle">消费者应用</text>

  <rect class="consumer" x="650" y="575" width="190" height="105" rx="8"/>
  <text class="label" x="745" y="603" text-anchor="middle">Consumer Group</text>
  <text class="small" x="745" y="626" text-anchor="middle">消费者组</text>
  <text class="tiny" x="745" y="650" text-anchor="middle">Consumer 1  -> P0</text>
  <text class="tiny" x="745" y="668" text-anchor="middle">Consumer 2  -> P1</text>

  <path class="arrow" d="M 590 628 L 648 628"/>
  <text class="tiny" x="618" y="616" text-anchor="middle">组内分配</text>

  <rect x="120" y="570" width="210" height="98" rx="8" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="140" y="592" width="18" height="12" rx="2" class="partition-leader"/>
  <text class="tiny" x="168" y="602">Leader：生产/消费请求入口</text>
  <rect x="140" y="620" width="18" height="12" rx="2" class="partition-follower"/>
  <text class="tiny" x="168" y="630">Follower：同步副本</text>
  <line x1="140" y1="651" x2="158" y2="651" stroke="#16a34a" stroke-width="2" stroke-dasharray="7 5"/>
  <text class="tiny" x="168" y="655">副本同步</text>
</svg>
